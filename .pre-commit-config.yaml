repos:
  # ============================================================
  # General
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # ============================================================
  # Go (Aggregator)
  # ============================================================
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        files: ^services/aggregator/
      - id: go-vet
        files: ^services/aggregator/
      - id: go-unit-tests
        files: ^services/aggregator/

  # ============================================================
  # Python (Processor)
  # ============================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^services/processor/
      - id: ruff-format
        files: ^services/processor/

  # ============================================================
  # TypeScript / JavaScript (Delivery)
  # ============================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^services/delivery/
        types_or: [typescript, tsx, javascript, json, css, markdown]
