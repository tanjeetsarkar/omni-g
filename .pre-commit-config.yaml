repos:
  # ============================================================
  # General
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # ============================================================
  # Go (Aggregator)
  # ============================================================
  - repo: local
    hooks:
      - id: aggregator-go-fmt
        name: go-fmt (aggregator)
        entry: bash -c 'cd services/aggregator && gofmt -w $(find . -type f -name "*.go")'
        language: system
        pass_filenames: false
        files: ^services/aggregator/.*\.go$
      - id: aggregator-go-vet
        name: go-vet (aggregator)
        entry: bash -c 'cd services/aggregator && go vet ./...'
        language: system
        pass_filenames: false
        files: ^services/aggregator/(.*\.go|go\.mod|go\.sum)$
      - id: aggregator-go-unit-tests
        name: go-unit-tests (aggregator)
        entry: bash -c 'cd services/aggregator && go test ./...'
        language: system
        pass_filenames: false
        files: ^services/aggregator/(.*\.go|go\.mod|go\.sum)$

  # ============================================================
  # Python (Processor)
  # ============================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^services/processor/
      - id: ruff-format
        files: ^services/processor/

  # ============================================================
  # TypeScript / JavaScript (Delivery)
  # ============================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^services/delivery/
