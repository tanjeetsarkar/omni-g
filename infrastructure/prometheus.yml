global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'aggregator'
    static_configs:
      - targets: ['aggregator:8080']
    metrics_path: '/metrics'

  - job_name: 'processor'
    static_configs:
      - targets: ['processor:8001']
    metrics_path: '/metrics'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:7474']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
