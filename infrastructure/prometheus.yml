global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'aggregator'
    static_configs:
      - targets: ['aggregator:8080']
    metrics_path: '/metrics'

  - job_name: 'processor'
    static_configs:
      - targets: ['processor:8001']
    metrics_path: '/metrics'

  # Note: Kafka and Redis do not expose Prometheus metrics natively on their
  # protocol ports. Scraping 9092/6379 sends HTTP traffic and causes log noise.
  # Add kafka-exporter / redis-exporter jobs when exporters are enabled.

  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:7474']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
